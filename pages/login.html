            <div class="logo-container">

        <nav class="navbar">

                    <div>
                        <label>Title</label>
                        <input type="text" name="title">
                    </div>
                    <div>
                        <label>File</label>
                        <input type="file" name="filename" id="fileInput">
                    </div>

                        <label>Description</label>
                        <input type="text" name="description">
                    </div>
                    <div>
